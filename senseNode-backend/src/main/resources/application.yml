spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/sensenode?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456 # 请根据实际情况修改
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 开启数据库下划线字段到实体类驼峰命名的映射
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发期间打印 SQL 语句，方便调试
  global-config:
    db-config:
      id-type: auto # 对应数据库自增主键
